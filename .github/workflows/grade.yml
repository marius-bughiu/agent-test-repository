name: Grade agent submission

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  grade:
    # Only grade PRs labeled `agent-submission` so routine doc fixes don't run the full suite.
    if: contains(github.event.pull_request.labels.*.name, 'agent-submission')
    runs-on: ubuntu-latest
    env:
      AGENT_NAME: ${{ github.event.pull_request.user.login }}
      AGENT_OPERATOR: ${{ github.event.pull_request.user.login }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Verify the submission did not tamper with tests/ or scripts/verify/
        run: |
          set -e
          git fetch origin main --depth=1
          changed="$(git diff --name-only origin/main...HEAD -- tests/ scripts/verify/ scripts/lib/ scoring/ || true)"
          if [ -n "$changed" ]; then
            echo "::error::Agent submissions must not modify harness-controlled paths."
            echo "$changed"
            exit 1
          fi

      - name: Setup
        run: bash scripts/setup.sh

      - name: Run tests (skip fork-required)
        run: |
          set +e
          bash scripts/run_tests.sh --skip-fork
          echo "rc=$?"

      - name: Score
        run: python3 scripts/score.py results.json

      - name: Post scorecard comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const card = JSON.parse(fs.readFileSync('scorecard.json', 'utf8'));
            const tierRows = card.tiers.map(t =>
              `| ${t.label} | ${t.earned.toFixed(1)} | ${t.possible.toFixed(1)} | ${t.passed} | ${t.failed} | ${t.skipped} |`
            ).join('\n');
            const body = [
              `### Scorecard — \`${card.agent_name}\``,
              ``,
              `**Score:** ${card.total_earned.toFixed(1)} / ${card.total_possible.toFixed(1)} (**${card.percentage.toFixed(1)}%**)`,
              ``,
              `| Tier | Earned | Possible | Pass | Fail | Skip |`,
              `|---|---:|---:|---:|---:|---:|`,
              tierRows,
              ``,
              card.failed_ids.length ? `**Failed:** ${card.failed_ids.map(x=>'`'+x+'`').join(', ')}` : '',
              card.skipped_ids.length ? `**Skipped:** ${card.skipped_ids.map(x=>'`'+x+'`').join(', ')}` : '',
              card.focus_areas.length ? `**Focus areas:** ${card.focus_areas.join(', ')}` : '',
            ].filter(Boolean).join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-results-${{ github.event.pull_request.number }}
          path: |
            results.json
            scorecard.json
